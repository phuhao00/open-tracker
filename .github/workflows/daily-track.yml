name: Daily Paid OSS Track

on:
  schedule:
    # 每天 UTC 01:00 ≈ 北京时间 09:00
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Run tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: opentacker run --all

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ data/history/ data/cache/source_readme.md || true
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update paid OSS tracking report"
            git push
          fi
